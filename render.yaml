services:
  - type: web
    name: leadflow-crm
    env: node
    plan: free
    branch: main
    buildCommand: |
      cd server
      npm install
      cd ../client
      npm install
      npm run build
    startCommand: |
      cd server
      npm install
      npm start
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
    healthCheckPath: /api/health
